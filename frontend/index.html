<!DOCTYPE html>
<html>
<head>
  <title>Joyful Creationz</title>
</head>
<body>

<h1>Joyful Creationz</h1>

<h2>Create User</h2>
<form id="userForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Create User</button>
</form>

<h2>Users</h2>
<button id="getUsers">Get Users</button>

<h2>Products</h2>
<button id="getProducts">Get Products</button>
<button id="createProduct">Create Product</button>

<h2>Orders</h2>
<button id="getOrders">Get Orders</button>
<button id="createOrder">Create Order</button>

<h2>Events</h2>
<button id="getEvents">Get Events</button>
<button id="createEvent">Create Event</button>

<script src="app.js"></script>

</body>
</html>
